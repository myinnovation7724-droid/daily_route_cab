<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>👨‍💼 Admin Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.status {
  margin-top:6px;
  font-weight:bold;
}

/* Tabs */
.tabs {
  display:flex;
  background:#fff;
}

.tab {
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  border-bottom:2px solid transparent;
}

.tab.active {
  border-bottom:3px solid #1976d2;
  font-weight:bold;
}

/* Layout */
.container { padding:10px; }

/* Top Filter Row */
.topbar {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.topbar input {
  flex:0.6;
  padding:8px;
  border-radius:8px;
}

.topbar button {
  flex:0.4;
  padding:8px;
  border:none;
  background:#1976d2;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* Filters */
.filters {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

select {
  flex:1;
  padding:10px;
  border-radius:8px;
}

/* Summary */
.summary-title {
  font-weight:bold;
  margin:12px 0 6px;
}

.summary-card {
  background:#e3f2fd;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.count {
  background:#1976d2;
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

/* Cards */
.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.name { font-weight:bold; }
.row { font-size:14px; }

.eta {
  margin-top:6px;
  font-weight:bold;
  color:green;
}
</style>
</head>

<body>

<header>👨‍💼 Admin Dashboard</header>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="showTab('summaryTab', this)">Summary</div>
  <div class="tab" onclick="showTab('detailsTab', this)">Passenger Details</div>
</div>

<div class="container">

<!-- TOP BAR -->
<div class="topbar">
  <input type="date" id="dateFilter">
</div>

<!-- ================= SUMMARY TAB ================= -->
<div id="summaryTab">
  <div id="summary"></div>
</div>

<!-- ================= DETAILS TAB ================= -->
<div id="detailsTab" style="display:none;">

  <div class="filters">
    <select id="shiftFilter"><option value="">All Shifts</option></select>
    <select id="cabFilter"><option value="">All Cab Types</option></select>
    <select id="pickupFilter"><option value="">All Pickups</option></select>
  </div>

  <div id="list"></div>

</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx_vjKoYYDsXLRoG0uuFrYIbN2MjELb0j8W1TgzrqfGS_wHFhFt_tbghTUaFt-rNQFP/exec";

let data = [];

/* LOAD DATA */
function loadData() {
  fetch(API_URL)
  .then(res => res.json())
  .then(json => {
    data = json;
    populateFilters();

    const today = new Date().toLocaleDateString('en-CA');
    if (!dateFilter.value) dateFilter.value = today;

    renderSummaryTab();
    renderDetails();
  });
}


/* TAB SWITCH */
function showTab(tabId, el) {
  document.getElementById("summaryTab").style.display = "none";
  document.getElementById("detailsTab").style.display = "none";

  document.getElementById(tabId).style.display = "block";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

/* FILTERS */
function populateFilters() {
  shiftFilter.innerHTML = '<option value="">All Shifts</option>';
  cabFilter.innerHTML = '<option value="">All Cab Types</option>';
  pickupFilter.innerHTML = '<option value="">All Pickups</option>';

  const shifts = [...new Set(data.map(d => d.Shift))];
  const cabs = [...new Set(data.map(d => d["Cab Type"]))];
  const pickups = [...new Set(data.map(d => d["Pickup Location"]))];

  shifts.forEach(s => shiftFilter.innerHTML += `<option>${s}</option>`);
  cabs.forEach(c => cabFilter.innerHTML += `<option>${c}</option>`);
  pickups.forEach(p => pickupFilter.innerHTML += `<option>${p}</option>`);
}

shiftFilter.onchange = renderDetails;
cabFilter.onchange = renderDetails;
pickupFilter.onchange = renderDetails;

dateFilter.onchange = () => {
  renderSummaryTab();
  renderDetails();
};

/* SUMMARY */
function renderSummaryTab() {

  const selectedDate = dateFilter.value;

  const filtered = data.filter(d => {
    const rowDate = new Date(d.Timestamp).toLocaleDateString('en-CA');
    return !selectedDate || rowDate === selectedDate;
  });

  const bookingMap = {};
  const pickedMap = {};

  filtered.forEach(d => {
    const cab = d["Cab Type"];

    // Booking count
    bookingMap[cab] = (bookingMap[cab] || 0) + 1;

    // Picked (Status = Pickup)
if (d.Status && d.Status.toLowerCase().includes("pick")) {
  pickedMap[cab] = (pickedMap[cab] || 0) + 1;
}
  summary.innerHTML = `
    <div class="summary-title">📊 Booking Details</div>
    ${renderSummaryCards(bookingMap)}

    <div class="summary-title">✅ Picked Persons</div>
    ${renderSummaryCards(pickedMap)}
  `;
}

function renderSummaryCards(map) {
  return Object.keys(map).map(k => `
    <div class="summary-card">
      <span>${k}</span>
      <span class="count">${map[k]} Persons</span>
    </div>
  `).join('');
}

/* DETAILS */

function getStatusUI(status) {
  if (!status) return "";

  status = status.toLowerCase();

  if (status.includes("pick")) {
    return "✅ Picked Up";
  } else if (status.includes("book")) {
    return "📌 Booked";
  } else {
    return "⏳ Pending";
  }
}


function renderDetails() {

  const shift = shiftFilter.value;
  const cab = cabFilter.value;
  const pickup = pickupFilter.value;
  const selectedDate = dateFilter.value;

  const filtered = data.filter(d => {

    const rowDate = new Date(d.Timestamp).toLocaleDateString('en-CA');
    return (
      (!shift || d.Shift === shift) &&
      (!cab || d["Cab Type"] === cab) &&
      (!pickup || d["Pickup Location"] === pickup) &&
      (!selectedDate || rowDate === selectedDate)
    );
  });

  renderList(filtered);
}

/* LIST */
function renderList(data) {

  data.sort((a, b) => {
    return parseTime(a["Estimated Arrival Time"]) - parseTime(b["Estimated Arrival Time"]);
  });

  list.innerHTML = data.map(d => `
    <div class="card">
      <div class="name">${d["Your Name"]}</div>
      <div class="row">Contact: ${d["Contact Number"]}</div>
      <div class="row">Shift: ${d.Shift}</div>
      <div class="row">Cab: ${d["Cab Type"]}</div>
      <div class="eta">Pickup: ${d["Pickup Location"]}</div>
      <div class="row">Drop: ${d["Drop Location"]}</div>
      <div class="eta">ETA: ${d["Estimated Arrival Time"]}</div>
      <div class="status">${getStatusUI(d.Status)}</div>
    </div>
  `).join('');
}

/* TIME PARSER */
function parseTime(t) {
  if (!t || t === "N/A") return 999999;

  const [time, mod] = t.split(" ");
  let [h, m] = time.split(":");

  h = parseInt(h);
  m = parseInt(m);

  if (mod === "PM" && h !== 12) h += 12;
  if (mod === "AM" && h === 12) h = 0;

  return h * 60 + m;
}
loadData();
</script>

</body>
</html>
