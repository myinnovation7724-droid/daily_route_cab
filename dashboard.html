<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container { padding:10px; }

.filters {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

select {
  flex:1;
  padding:10px;
  border-radius:8px;
}

.summary-card {
  background:#e3f2fd;
  padding:10px;
  margin-bottom:6px;
  border-radius:8px;
  font-weight:bold;
}

.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.name { font-weight:bold; }

.row { font-size:14px; }

.eta {
  margin-top:6px;
  font-weight:bold;
  color:green;
}
.split-container {
  display:flex;
  gap:10px;
}

.half {
  flex:1;
}

.divider {
  width:2px;
  background:#ccc;
}
</style>
</head>

<body>

<header>🚖 Driver Dashboard</header>

<div class="container">

<div id="summary"></div>

<div class="filters">
  <input type="date" id="dateFilter" />
  <select id="shiftFilter"><option value="">All Shifts</option></select>
  <select id="cabFilter"><option value="">All Cab Types</option></select>
  <select id="pickupFilter"><option value="">All Pickups</option></select>
</div>
<div class="split-container">
  <div class="half">
    <h3>🌅 Morning</h3>
    <div id="morningList"></div>
  </div>

  <div class="divider"></div>

  <div class="half">
    <h3>🌙 Evening</h3>
    <div id="eveningList"></div>
  </div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx_vjKoYYDsXLRoG0uuFrYIbN2MjELb0j8W1TgzrqfGS_wHFhFt_tbghTUaFt-rNQFP/exec";

let data = [];

fetch(API_URL)
.then(res => res.json())
.then(json => {
  data = json;
  populateFilters();
  render();
});

const today = new Date().toISOString().split("T")[0];
dateFilter.value = today;

function populateFilters() {
  const shifts = [...new Set(data.map(d => d.Shift))];
  const cabs = [...new Set(data.map(d => d["Cab Type"]))];
  const pickups = [...new Set(data.map(d => d["Pickup Location"]))];

  shifts.forEach(s => shiftFilter.innerHTML += `<option>${s}</option>`);
  cabs.forEach(c => cabFilter.innerHTML += `<option>${c}</option>`);
  pickups.forEach(p => pickupFilter.innerHTML += `<option>${p}</option>`);
}

shiftFilter.onchange = render;
cabFilter.onchange = render;

dateFilter.onchange = render;

function render() {
  const cab = cabFilter.value;
  const pickup = pickupFilter.value;
  const selectedDate = dateFilter.value;

  const filtered = data.filter(d => {

    // Extract only date from timestamp
    const rowDate = new Date(d.Timestamp).toISOString().split("T")[0];

    return (
      (!cab || d["Cab Type"] === cab) &&
      (!pickup || d["Pickup Location"] === pickup) &&
      (!selectedDate || rowDate === selectedDate)
    );
  });

  // Split by Shift
  const morning = filtered.filter(d => d.Shift.toLowerCase() === "morning");
  const evening = filtered.filter(d => d.Shift.toLowerCase() === "evening");

  renderList(morning, "morningList");
  renderList(evening, "eveningList");
}

// SORT BY ETA
function renderList(data, targetId) {

  data.sort((a, b) => {
    return parseTime(a["Estimated Arrival Time"]) - parseTime(b["Estimated Arrival Time"]);
  });

  document.getElementById(targetId).innerHTML = data.map(d => `
    <div class="card">
      <div class="name">${d["Your Name"]}</div>
      <div class="row">📞 Contact: ${d["Contact Number"]}</div>
      <div class="row">Cab: ${d["Cab Type"]}</div>
      <div class="eta">Pickup: ${d["Pickup Location"]}</div>
      <div class="row">Drop: ${d["Drop Location"]}</div>
      <div class="eta">ETA: ${d["Estimated Arrival Time"]}</div>
    </div>
  `).join('');
}

// TIME PARSER
function parseTime(t) {
  if (!t || t === "N/A") return 999999;

  const [time, mod] = t.split(" ");
  let [h, m] = time.split(":");

  h = parseInt(h);
  m = parseInt(m);

  if (mod === "PM" && h !== 12) h += 12;
  if (mod === "AM" && h === 12) h = 0;

  return h * 60 + m;
}
</script>

</body>
</html>
