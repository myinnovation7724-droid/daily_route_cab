<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

/* Tabs */
.tabs {
  display:flex;
  background:#fff;
}

.tab {
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  border-bottom:2px solid transparent;
}

.tab.active {
  border-bottom:3px solid #1976d2;
  font-weight:bold;
}

/* Layout */
.container { padding:10px; }

.filters {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

select, input {
  flex:1;
  padding:10px;
  border-radius:8px;
}

/* Summary UI */
.summary-section {
  margin-bottom:15px;
}

.summary-title {
  font-weight:bold;
  margin:10px 0;
}

.summary-card {
  background:#e3f2fd;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.count {
  background:#1976d2;
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

/* Cards */
.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.name { font-weight:bold; }

.row { font-size:14px; }

.eta {
  margin-top:6px;
  font-weight:bold;
  color:green;
}
</style>
</head>

<body>

<header>🚖 Driver Dashboard</header>

<!-- Tabs -->
<div class="tabs">
  <div class="tab active" onclick="showTab('summaryTab', this)">Summary</div>
  <div class="tab" onclick="showTab('detailsTab', this)">Passenger Details</div>
</div>

<div class="container">

<!-- DATE FILTER (COMMON) -->
<div class="filters">
  <input type="date" id="dateFilter">
</div>

<!-- ================= SUMMARY TAB ================= -->
<div id="summaryTab">
  <div id="summary"></div>
</div>

<!-- ================= DETAILS TAB ================= -->
<div id="detailsTab" style="display:none;">

  <div class="filters">
    <select id="shiftFilter"><option value="">All Shifts</option></select>
    <select id="cabFilter"><option value="">All Cab Types</option></select>
    <select id="pickupFilter"><option value="">All Pickups</option></select>
  </div>

  <div id="list"></div>

</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbx_vjKoYYDsXLRoG0uuFrYIbN2MjELb0j8W1TgzrqfGS_wHFhFt_tbghTUaFt-rNQFP/exec";

let data = [];

fetch(API_URL)
.then(res => res.json())
.then(json => {
  data = json;
  populateFilters();

  // Default today date
  const today = new Date().toISOString().split("T")[0];
  dateFilter.value = today;

  renderSummaryTab();
  renderDetails();
});

/* TAB SWITCH */
function showTab(tabId, el) {
  document.getElementById("summaryTab").style.display = "none";
  document.getElementById("detailsTab").style.display = "none";

  document.getElementById(tabId).style.display = "block";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

/* FILTERS */
function populateFilters() {
  const shifts = [...new Set(data.map(d => d.Shift))];
  const cabs = [...new Set(data.map(d => d["Cab Type"]))];
  const pickups = [...new Set(data.map(d => d["Pickup Location"]))];

  shifts.forEach(s => shiftFilter.innerHTML += `<option>${s}</option>`);
  cabs.forEach(c => cabFilter.innerHTML += `<option>${c}</option>`);
  pickups.forEach(p => pickupFilter.innerHTML += `<option>${p}</option>`);
}

shiftFilter.onchange = renderDetails;
cabFilter.onchange = renderDetails;
pickupFilter.onchange = renderDetails;

dateFilter.onchange = () => {
  renderSummaryTab();
  renderDetails();
};

/* ================= SUMMARY ================= */
function renderSummaryTab() {

  const selectedDate = dateFilter.value;

  const filtered = data.filter(d => {
    const rowDate = new Date(d.Timestamp).toISOString().split("T")[0];
    return !selectedDate || rowDate === selectedDate;
  });

  const map = {
    Morning: {},
    Evening: {}
  };

  filtered.forEach(d => {
    const shift = d.Shift;
    const time = d["Estimated Arrival Time"];

    if (!map[shift]) return;

    map[shift][time] = (map[shift][time] || 0) + 1;
  });

  summary.innerHTML = `
    ${renderSection("🌅 Morning", map.Morning)}
    ${renderSection("🌙 Evening", map.Evening)}
  `;
}

function renderSection(title, obj) {

  const keys = Object.keys(obj).sort((a,b)=> parseTime(a) - parseTime(b));

  if (keys.length === 0) return "";

  return `
    <div class="summary-section">
      <div class="summary-title">${title}</div>
      ${keys.map(k => `
        <div class="summary-card">
          <span>${k}</span>
          <span class="count">${obj[k]} Persons</span>
        </div>
      `).join('')}
    </div>
  `;
}

/* ================= DETAILS ================= */
function renderDetails() {

  const shift = shiftFilter.value;
  const cab = cabFilter.value;
  const pickup = pickupFilter.value;
  const selectedDate = dateFilter.value;

  const filtered = data.filter(d => {

    const rowDate = new Date(d.Timestamp).toISOString().split("T")[0];

    return (
      (!shift || d.Shift === shift) &&
      (!cab || d["Cab Type"] === cab) &&
      (!pickup || d["Pickup Location"] === pickup) &&
      (!selectedDate || rowDate === selectedDate)
    );
  });

  renderList(filtered);
}

/* LIST */
function renderList(data) {

  data.sort((a, b) => {
    return parseTime(a["Estimated Arrival Time"]) - parseTime(b["Estimated Arrival Time"]);
  });

  list.innerHTML = data.map(d => `
    <div class="card">
      <div class="name">${d["Your Name"]}</div>
      <div class="row">📞 Contact: ${d["Contact Number"]}</div>
      <div class="row">Shift: ${d.Shift}</div>
      <div class="row">Cab: ${d["Cab Type"]}</div>
      <div class="row">Pickup: ${d["Pickup Location"]}</div>
      <div class="row">Drop: ${d["Drop Location"]}</div>
      <div class="eta">ETA: ${d["Estimated Arrival Time"]}</div>
    </div>
  `).join('');
}

/* TIME PARSER */
function parseTime(t) {
  if (!t || t === "N/A") return 999999;

  const [time, mod] = t.split(" ");
  let [h, m] = time.split(":");

  h = parseInt(h);
  m = parseInt(m);

  if (mod === "PM" && h !== 12) h += 12;
  if (mod === "AM" && h === 12) h = 0;

  return h * 60 + m;
}
</script>

</body>
</html>
