<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.tabs { display:flex; background:#fff; }

.tab {
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
  border-bottom:2px solid transparent;
}

.tab.active {
  border-bottom:3px solid #1976d2;
  font-weight:bold;
}

.container { padding:10px; }

.filters {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

select {
  flex:1;
  padding:10px;
  border-radius:8px;
}

.summary-title {
  font-weight:bold;
  margin:12px 0 6px;
}

.summary-card {
  background:#e3f2fd;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.count {
  background:#1976d2;
  color:white;
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
}

.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.name { font-weight:bold; }
.row { font-size:14px; }

.eta {
  margin-top:6px;
  font-weight:bold;
  color:green;
}

.otp-box {
  display:flex;
  gap:5px;
  margin-top:10px;
}

.otp-box input {
  width:30px;
  height:40px;
  text-align:center;
  font-size:16px;
  border-radius:6px;
  border:1px solid #ccc;
}

.verify-btn {
  margin-top: 10px;
  padding: 10px 12px;
  width: 100%;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  cursor: pointer;
}

.msg {
  font-size:13px;
  margin-top:5px;
}

.no-data {
  text-align:center;
  margin-top:30px;
  color:#777;
}
</style>
</head>

<body>

<header>🚖 Driver Dashboard (Today)</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('summaryTab', this)">Summary</div>
  <div class="tab" onclick="showTab('detailsTab', this)">Passenger Details</div>
</div>

<div class="container">

<div id="summaryTab">
  <div id="summary"></div>
</div>

<div id="detailsTab" style="display:none;">

  <div class="filters">
    <select id="shiftFilter"><option value="">All Shifts</option></select>
    <select id="cabFilter"><option value="">All Cab Types</option></select>
    <select id="pickupFilter"><option value="">All Pickups</option></select>
  </div>

  <div id="list"></div>

</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzLvqkwYPnTwcokwouaLBnaaYM5BwpsshkkIt5vhJl71wOl-jtsz1HQXiKHRJ3C8Lhm/exec";

let data = [];

/* LOAD DATA */
function loadData() {
  fetch(API_URL)
  .then(res => res.json())
  .then(json => {

    const today = new Date().toLocaleDateString("en-US");

    data = json.filter(d => d.Date && d.Date.trim() === today);

    populateFilters();
    renderSummaryTab();
    renderDetails();
  });
}

loadData();

/* TABS */
function showTab(tabId, el) {
  summaryTab.style.display = "none";
  detailsTab.style.display = "none";

  document.getElementById(tabId).style.display = "block";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

/* FILTERS */
function populateFilters() {

  shiftFilter.innerHTML = '<option value="">All Shifts</option>';
  cabFilter.innerHTML = '<option value="">All Cab Types</option>';
  pickupFilter.innerHTML = '<option value="">All Pickups</option>';

  const shifts = [...new Set(data.map(d => d.Shift))];
  const cabs = [...new Set(data.map(d => d["Cab Type"]))];
  const pickups = [...new Set(data.map(d => d["Pickup Location"]))];

  shifts.forEach(s => shiftFilter.innerHTML += `<option>${s}</option>`);
  cabs.forEach(c => cabFilter.innerHTML += `<option>${c}</option>`);
  pickups.forEach(p => pickupFilter.innerHTML += `<option>${p}</option>`);
}

shiftFilter.onchange = renderDetails;
cabFilter.onchange = renderDetails;
pickupFilter.onchange = renderDetails;

/* SUMMARY */
function renderSummaryTab() {

  if (data.length === 0) {
    summary.innerHTML = `<div class="no-data">No data for today</div>`;
    return;
  }

  const bookingMap = {};
  const pickedMap = {};

  data.forEach(d => {
    const cab = d["Cab Type"];

    bookingMap[cab] = (bookingMap[cab] || 0) + 1;

    if (d.Status === "Picked") {
      pickedMap[cab] = (pickedMap[cab] || 0) + 1;
    }
  });

  summary.innerHTML = `
    <div class="summary-title">📊 Booking Details</div>
    ${renderSummaryCards(bookingMap)}
    <div class="summary-title">✅ Picked Persons</div>
    ${renderSummaryCards(pickedMap)}
  `;
}

function renderSummaryCards(map) {
  return Object.keys(map).map(k => `
    <div class="summary-card">
      <span>${k}</span>
      <span class="count">${map[k]} Persons</span>
    </div>
  `).join('');
}

/* DETAILS WITH SORTING */
function renderDetails() {

  const shift = shiftFilter.value;
  const cab = cabFilter.value;
  const pickup = pickupFilter.value;

  let filtered = data.filter(d => (
    (!shift || d.Shift === shift) &&
    (!cab || d["Cab Type"] === cab) &&
    (!pickup || d["Pickup Location"] === pickup)
  ));

  // ✅ SORT BY ETA (EARLIEST FIRST)
  filtered.sort((a, b) => {
    const timeA = new Date("1970-01-01 " + a["Estimated Arrival Time"]);
    const timeB = new Date("1970-01-01 " + b["Estimated Arrival Time"]);
    return timeA - timeB;
  });

  renderList(filtered);
}

/* LIST */
function renderList(dataArr) {

  if (dataArr.length === 0) {
    list.innerHTML = `<div class="no-data">No passengers found</div>`;
    return;
  }

  list.innerHTML = dataArr.map((d, index) => `
    <div class="card">
      <div class="name">${d["Your Name"]}</div>
      <div class="row">Contact: ${d["Contact Number"]}</div>
      <div class="row">Shift: ${d.Shift}</div>
      <div class="row">Cab: ${d["Cab Type"]}</div>
      <div class="eta">Pickup: ${d["Pickup Location"]}</div>
      <div class="row">Drop: ${d["Drop Location"]}</div>
      <div class="eta">ETA: ${d["Estimated Arrival Time"]}</div>

      ${d.Status === "Picked" ? `
        <div class="msg" style="color:green;font-weight:bold;">✅ Picked Up</div>
      ` : `
        <div class="otp-box" id="otp-${index}">
          ${[0,1,2,3,4,5].map(i => `
            <input maxlength="1" inputmode="numeric"
            oninput="handleInput(this, ${index}, ${i})">
          `).join('')}
        </div>

        <button class="verify-btn" onclick="verifyOTP(${index}, ${d.rowId})">Verify OTP</button>
        <div class="msg" id="msg-${index}"></div>
      `}
    </div>
  `).join('');
}

/* OTP INPUT */
function handleInput(el, row, index) {
  el.value = el.value.replace(/[^0-9]/g, '');
  if (el.value && index < 5) {
    document.querySelectorAll(`#otp-${row} input`)[index+1]?.focus();
  }
}

/* VERIFY */
function verifyOTP(index, rowId) {

  const inputs = document.querySelectorAll(`#otp-${index} input`);
  const otp = Array.from(inputs).map(i => i.value).join('');

  const msg = document.getElementById(`msg-${index}`);
  const otpBox = document.getElementById(`otp-${index}`);

  if (otp.length !== 6) {
    msg.innerHTML = "⚠️ Enter 6 digit OTP";
    msg.style.color = "orange";
    return;
  }

  fetch(API_URL + "?otp=" + otp + "&rowId=" + rowId)
  .then(res => res.json())
  .then(res => {
    if (res.success) {
      otpBox.style.display = "none";
      msg.innerHTML = "✅ Picked Up";
      msg.style.color = "green";
    } else {
      msg.innerHTML = "❌ Invalid OTP";
      msg.style.color = "red";
    }
  });
}
</script>

</body>
</html>
