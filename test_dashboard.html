<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
}

.tabs { display:flex; background:#fff; }

.tab {
  flex:1;
  padding:12px;
  text-align:center;
  cursor:pointer;
}

.tab.active {
  border-bottom:3px solid #1976d2;
  font-weight:bold;
}

.container { padding:10px; }

.topbar {
  display:flex;
  gap:8px;
  margin-bottom:10px;
}

.topbar input, button {
  padding:10px;
  border-radius:8px;
}

button {
  background:#1976d2;
  color:white;
  border:none;
  cursor:pointer;
}

.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
}

.eta { color:green; font-weight:bold; }
</style>
</head>

<body>

<header>🚖 Driver Dashboard</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('summaryTab', this)">Summary</div>
  <div class="tab" onclick="showTab('detailsTab', this)">Details</div>
</div>

<div class="container">

<div class="topbar">
  <input type="date" id="dateFilter">
  <button onclick="refreshData()">🔄 Refresh</button>
</div>

<!-- SUMMARY -->
<div id="summaryTab">
  <div id="summary"></div>
</div>

<!-- DETAILS -->
<div id="detailsTab" style="display:none;">

  <!-- OTP -->
  <div class="card">
    <h3>🔐 Verify OTP</h3>
    <input type="number" id="otpInput" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify</button>
    <p id="otpMsg"></p>
  </div>

  <div id="list"></div>

</div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbxweumoEVUKplYGa2TTyAhYa1JMXOzJ2hoHWpjTKkU8P7S37acGfD2HwKVdxNOjj3oG/exec";

let data = [];

/* LOAD DATA */
function loadData() {
  fetch(API_URL + "?t=" + new Date().getTime()) // 🔥 cache fix
  .then(res => res.json())
  .then(json => {
    data = json;

    const today = new Date().toISOString().split("T")[0];
    if (!dateFilter.value) dateFilter.value = today;

    renderSummaryTab();
    renderDetails();
  });
}

loadData();

/* REFRESH */
function refreshData() {
  list.innerHTML = "⏳ Refreshing...";
  loadData();
}

/* OTP VERIFY */
function verifyOTP() {

  const otp = document.getElementById("otpInput").value;

  if (!otp) {
    otpMsg.innerHTML = "❌ Enter OTP";
    return;
  }

  otpMsg.innerHTML = "⏳ Verifying...";

  fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify({ otp: otp })
  })
  .then(res => res.json())
  .then(res => {

    if (res.status === "success") {
      otpMsg.innerHTML = "✅ Passenger Picked";
      otpInput.value = "";
      loadData();
    } else {
      otpMsg.innerHTML = "❌ Please enter correct OTP";
    }

  });
}

/* TABS */
function showTab(id, el) {
  summaryTab.style.display = "none";
  detailsTab.style.display = "none";

  document.getElementById(id).style.display = "block";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

/* SUMMARY */
function renderSummaryTab() {

  const selectedDate = dateFilter.value;

  const filtered = data.filter(d => {
    const rowDate = new Date(d.Timestamp).toISOString().split("T")[0];
    return !selectedDate || rowDate === selectedDate;
  });

  let booked = filtered.length;
  let picked = filtered.filter(d => d.Status === "Picked").length;

  summary.innerHTML = `
    <div class="card">📊 Booked: ${booked}</div>
    <div class="card">✅ Picked: ${picked}</div>
  `;
}

/* DETAILS */
function renderDetails() {

  list.innerHTML = data.map(d => `
    <div class="card">
      <b>${d["Your Name"]}</b><br>
      ${d["Contact Number"]}<br>
      ${d["Cab Type"]}<br>
      ${d["Pickup Location"]}<br>
      ETA: ${d["Estimated Arrival Time"]}<br>
      Status: <b>${d["Status"]}</b>
    </div>
  `).join('');
}

</script>

</body>
</html>
