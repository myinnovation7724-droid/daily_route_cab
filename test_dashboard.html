<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Driver Dashboard</title>

<style>
body { font-family: Arial; margin:0; background:#f4f6f9; }

header {
  background:#1976d2;
  color:white;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.tabs { display:flex; background:#fff; }
.tab {
  flex:1; padding:12px; text-align:center;
  cursor:pointer; border-bottom:2px solid transparent;
}
.tab.active {
  border-bottom:3px solid #1976d2;
  font-weight:bold;
}

.container { padding:10px; }

.topbar {
  display:flex; gap:8px; margin-bottom:10px;
}
.topbar input {
  flex:0.6; padding:8px; border-radius:8px;
}
.topbar button {
  flex:0.4; padding:8px; border:none;
  background:#1976d2; color:white;
  border-radius:8px; cursor:pointer;
}

.filters { display:flex; gap:8px; margin-bottom:10px; }
select { flex:1; padding:10px; border-radius:8px; }

.summary-card {
  background:#e3f2fd;
  padding:12px;
  margin-bottom:8px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
}

.card {
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.eta { font-weight:bold; color:green; }
</style>
</head>

<body>

<header>🚖 Driver Dashboard</header>

<div class="tabs">
  <div class="tab active" onclick="showTab('summaryTab', this)">Summary</div>
  <div class="tab" onclick="showTab('detailsTab', this)">Passenger Details</div>
</div>

<div class="container">

<div class="topbar">
  <input type="date" id="dateFilter">
  <button onclick="refreshData()">🔄 Refresh</button>
</div>

<!-- SUMMARY -->
<div id="summaryTab">
  <div id="summary"></div>
</div>

<!-- DETAILS -->
<div id="detailsTab" style="display:none;">

  <!-- OTP SECTION -->
  <div style="background:#fff;padding:12px;border-radius:10px;margin-bottom:10px;">
    <h3>🔐 Verify Passenger (OTP)</h3>
    <input type="number" id="otpInput" placeholder="Enter OTP" style="width:100%;padding:10px;border-radius:8px;">
    <button onclick="verifyOTP()" style="width:100%;margin-top:10px;padding:10px;background:#28a745;color:white;border:none;border-radius:8px;">
      ✅ Verify & Pickup
    </button>
    <p id="otpMsg"></p>
  </div>

  <div class="filters">
    <select id="shiftFilter"></select>
    <select id="cabFilter"></select>
    <select id="pickupFilter"></select>
  </div>

  <div id="list"></div>
</div>

</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyjHrKU0N7WQEXQBuodvkdYOzkF0NJqAWgXnpkKZxTFHjF16OQffjJqYscJ-0UwAloi/exec";

let data = [];

/* LOAD DATA */
function loadData() {
  fetch(API_URL + "?t=" + new Date().getTime()) // 🔥 FIX CACHE
  .then(res => res.json())
  .then(json => {
    data = json;
    populateFilters();

    const today = new Date().toISOString().split("T")[0];
    if (!dateFilter.value) dateFilter.value = today;

    renderSummaryTab();
    renderDetails();
  });
}

loadData();

/* REFRESH */
function refreshData() {
  list.innerHTML = "⏳ Refreshing...";
  loadData();
}

/* OTP VERIFY */
function verifyOTP() {
  const otp = document.getElementById("otpInput").value;

  if (!otp) {
    otpMsg.innerHTML = "❌ Enter OTP";
    return;
  }

  otpMsg.innerHTML = "⏳ Verifying...";

  fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({ otp: otp })
  })
  .then(res => res.json())
  .then(res => {
    if (res.status === "success") {
      otpMsg.innerHTML = "✅ Passenger Picked";
      otpInput.value = "";
      loadData();
    } else {
      otpMsg.innerHTML = "❌ Please enter correct OTP";
    }
  });
}

/* TABS */
function showTab(id, el) {
  summaryTab.style.display = "none";
  detailsTab.style.display = "none";
  document.getElementById(id).style.display = "block";

  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
}

/* FILTERS */
function populateFilters() {
  shiftFilter.innerHTML = '<option value="">All Shifts</option>';
  cabFilter.innerHTML = '<option value="">All Cab</option>';
  pickupFilter.innerHTML = '<option value="">All Pickup</option>';

  [...new Set(data.map(d => d.Shift))].forEach(v => shiftFilter.innerHTML += `<option>${v}</option>`);
  [...new Set(data.map(d => d["Cab Type"]))].forEach(v => cabFilter.innerHTML += `<option>${v}</option>`);
  [...new Set(data.map(d => d["Pickup Location"]))].forEach(v => pickupFilter.innerHTML += `<option>${v}</option>`);
}

shiftFilter.onchange = renderDetails;
cabFilter.onchange = renderDetails;
pickupFilter.onchange = renderDetails;
dateFilter.onchange = () => { renderSummaryTab(); renderDetails(); };

/* SUMMARY */
function renderSummaryTab() {
  const selectedDate = dateFilter.value;

  const filtered = data.filter(d => {
    const rowDate = new Date(d.Timestamp).toISOString().split("T")[0];
    return !selectedDate || rowDate === selectedDate;
  });

  const booked = {};
  const picked = {};

  filtered.forEach(d => {
    const cab = d["Cab Type"];
    booked[cab] = (booked[cab] || 0) + 1;

    if (d["Status"] === "Picked") {
      picked[cab] = (picked[cab] || 0) + 1;
    }
  });

  summary.innerHTML = `
    <h3>📊 Booked</h3>
    ${renderCards(booked)}
    <h3>✅ Picked</h3>
    ${renderCards(picked)}
  `;
}

function renderCards(map) {
  return Object.keys(map).map(k => `
    <div class="summary-card">
      <span>${k}</span>
      <span>${map[k]}</span>
    </div>
  `).join('');
}

/* DETAILS */
function renderDetails() {
  const shift = shiftFilter.value;
  const cab = cabFilter.value;
  const pickup = pickupFilter.value;
  const selectedDate = dateFilter.value;

  const filtered = data.filter(d => {
    const rowDate = new Date(d.Timestamp).toISOString().split("T")[0];

    return (
      (!shift || d.Shift === shift) &&
      (!cab || d["Cab Type"] === cab) &&
      (!pickup || d["Pickup Location"] === pickup) &&
      (!selectedDate || rowDate === selectedDate)
    );
  });

  list.innerHTML = filtered.map(d => `
    <div class="card">
      <b>${d["Your Name"]}</b><br>
      ${d["Contact Number"]}<br>
      ${d["Cab Type"]}<br>
      ${d["Pickup Location"]}<br>
      ETA: ${d["Estimated Arrival Time"]}<br>
      Status: ${d["Status"]}
    </div>
  `).join('');
}
</script>

</body>
</html>
