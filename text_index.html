<script>

// 🔗 OLD API (NO CHANGE)
const API_URL = "https://script.google.com/macros/s/AKfycbx7t0pymTVw9snJxVQ3WmuukAVqpNoUHUHfsToKJveNCMLTeateWtCPDE3QCEGYalOi/exec";

// 🔴 NEW QR API (PUT YOUR NEW SCRIPT URL HERE)
const QR_API = "https://script.google.com/macros/s/AKfycbzXywzkY4UWEqWQJYRlRYpeYOqqjJVUWACVXdDmpi6FCbnlm6dGYD95H0IXVjWyZSwq/exec";

let data = [];
let locations = new Set();

// LOAD DATA
fetch(API_URL)
.then(res => res.json())
.then(res => {
  data = res;
  res.forEach(r => locations.add(r.pickup));
  loadLocations();
});

// LOAD LOCATIONS
function loadLocations() {
  const pick = document.getElementById("pickupList");
  const drop = document.getElementById("dropList");

  locations.forEach(loc => {
    let o1 = document.createElement("option");
    o1.value = loc;
    pick.appendChild(o1);

    let o2 = document.createElement("option");
    o2.value = loc;
    drop.appendChild(o2);
  });
}

// CAB OPTIONS
const cabOptions = [
  "Morning 7:30 AM",
  "Morning 8:10 AM",
  "Morning 8:40 AM",
  "Evening 5:20 PM",
  "Evening 5:40 PM",
  "Evening 6:20 PM"
];

// FILTER CAB
function filterCab() {
  const shift = document.getElementById("shift").value;
  const cab = document.getElementById("cab");

  cab.innerHTML = '<option value="">-- Select Cab --</option>';

  cabOptions.forEach(c => {
    if (c.startsWith(shift)) {
      let opt = document.createElement("option");
      opt.value = c;
      opt.textContent = c;
      cab.appendChild(opt);
    }
  });
}

// SET ETA
function setETA() {
  const cab = document.getElementById("cab").value;
  const pickup = document.getElementById("pickup").value;

  let match = data.find(d =>
    d.cab === cab && d.pickup === pickup
  );

  document.getElementById("eta").value =
    match ? match.eta : "Not Available";
}

// SUBMIT FORM
function submitForm(e) {
  e.preventDefault();

  const form = e.target;

  const name = form.querySelector('[name="entry.1455248696"]').value;
  const phone = form.querySelector('[name="entry.468587822"]').value;
  const shift = form.querySelector('[name="entry.157653572"]').value;
  const cab = form.querySelector('[name="entry.255326989"]').value;
  const pickup = form.querySelector('[name="entry.770044040"]').value;
  const drop = form.querySelector('[name="entry.1500323835"]').value;

  const eta = document.getElementById("eta").value;

  ////////////////////////////////////////////
  // ✅ 1. GOOGLE FORM SUBMIT (UNCHANGED)
  ////////////////////////////////////////////
  fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    mode: "no-cors"
  });

  ////////////////////////////////////////////
  // ✅ 2. QR API CALL
  ////////////////////////////////////////////
  fetch(QR_API, {
    method: "POST",
    body: JSON.stringify({
      name, phone, shift, cab, pickup, drop
    }),
    headers: { "Content-Type": "application/json" }
  })
  .then(res => res.json())
  .then(res => {

    if (res.status !== "success") {
      alert("QR failed");
      return;
    }

    ////////////////////////////////////////////
    // ✅ SUCCESS UI
    ////////////////////////////////////////////
    document.querySelector(".container").innerHTML = `
      <h2 style="color:green;">✅ Booking Confirmed</h2>
      <p><b>ETA:</b> ${eta}</p>
      <p><b>OTP:</b> ${res.otp}</p>
      <div id="qr"></div>
      <br>
      <button onclick="location.reload()">Book Again</button>
    `;

    // LOAD QR LIBRARY
    const script = document.createElement("script");
    script.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
    script.onload = () => {
      new QRCode(document.getElementById("qr"), {
        text: res.qr,
        width: 200,
        height: 200
      });
    };
    document.body.appendChild(script);

  })
  .catch(err => {
    console.error(err);
    alert("Error submitting booking");
  });
}

</script>
