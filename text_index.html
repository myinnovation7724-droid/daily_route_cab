<!DOCTYPE html>
<html>
<head>
  <title>Cab Booking</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }

.container {
  max-width:420px;
  margin:auto;
  background:#fff;
  padding:25px;
  border-radius:12px;
}

input, select {
  width:100%;
  padding:10px;
  margin-top:10px;
}

button {
  width:100%;
  margin-top:20px;
  padding:12px;
  background:#007bff;
  color:#fff;
  border:none;
}
</style>

</head>

<body>

<div class="container">
<h2>Cab Booking</h2>

<form action="https://docs.google.com/forms/d/e/1FAIpQLScU0eto2h9yRiCDoE9HvWhWDe7STGnb7Nba2wDv1r-B04suIA/formResponse"
onsubmit="submitForm(event)">

<input name="entry.1455248696" placeholder="Name" required>
<input name="entry.468587822" placeholder="Phone" required>

<select id="shift" name="entry.157653572" required onchange="filterCab()">
<option value="">Select Shift</option>
<option>Morning</option>
<option>Evening</option>
</select>

<select id="cab" name="entry.255326989" required onchange="setETA()"></select>

<input list="pickupList" id="pickup" name="entry.770044040" placeholder="Pickup" required onchange="setETA()">
<datalist id="pickupList"></datalist>

<input list="dropList" name="entry.1500323835" placeholder="Drop" required>
<datalist id="dropList"></datalist>

<input id="eta" readonly placeholder="ETA">

<button type="submit">Book</button>

</form>
</div>

<script>

// 🔗 OLD API
const API_URL = "https://script.google.com/macros/s/AKfycbx7t0pymTVw9snJxVQ3WmuukAVqpNoUHUHfsToKJveNCMLTeateWtCPDE3QCEGYalOi/exec";

// 🔴 NEW QR API
const QR_API = "https://script.google.com/macros/s/AKfycbwJ8EWpkXqVQATVArPCbn1611x5BB2eGD4Ct0JBtMNQlgnWMfc9Lkqw99IlgK_1w6k/exec";

let data = [];
let locations = new Set();

// LOAD DATA
fetch(API_URL)
.then(res => res.json())
.then(res => {
  data = res;
  res.forEach(r => locations.add(r.pickup));
  loadLocations();
});

// LOAD LOCATIONS
function loadLocations() {
  const pick = document.getElementById("pickupList");
  const drop = document.getElementById("dropList");

  locations.forEach(loc => {
    pick.innerHTML += `<option value="${loc}">`;
    drop.innerHTML += `<option value="${loc}">`;
  });
}

// CAB OPTIONS
const cabOptions = [
  "Morning 7:30 AM","Morning 8:10 AM","Morning 8:40 AM",
  "Evening 5:20 PM","Evening 5:40 PM","Evening 6:20 PM"
];

// FILTER CAB
function filterCab() {
  const shift = document.getElementById("shift").value;
  const cab = document.getElementById("cab");

  cab.innerHTML = '<option value="">Select Cab</option>';

  cabOptions.forEach(c => {
    if (c.startsWith(shift)) {
      cab.innerHTML += `<option>${c}</option>`;
    }
  });
}

// SET ETA
function setETA() {
  const cab = document.getElementById("cab").value;
  const pickup = document.getElementById("pickup").value;

  let match = data.find(d => d.cab === cab && d.pickup === pickup);

  document.getElementById("eta").value =
    match ? match.eta : "Not Available";
}

// SUBMIT
function submitForm(e) {
  e.preventDefault();

  const form = e.target;

  const name = form.querySelector('[name="entry.1455248696"]').value;
  const phone = form.querySelector('[name="entry.468587822"]').value;
  const shift = form.querySelector('[name="entry.157653572"]').value;
  const cab = form.querySelector('[name="entry.255326989"]').value;
  const pickup = form.querySelector('[name="entry.770044040"]').value;
  const drop = form.querySelector('[name="entry.1500323835"]').value;
  const eta = document.getElementById("eta").value;

  // STEP 1: FORM SUBMIT
  fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    mode: "no-cors"
  });

  // LOADING UI
  document.querySelector(".container").innerHTML =
    "<h2>⏳ Processing...</h2>";

  // STEP 2: WAIT
  setTimeout(() => {

    // STEP 3: QR API
    fetch(QR_API, {
      method: "POST",
      body: JSON.stringify({ name, phone, shift, cab, pickup, drop }),
      headers: { "Content-Type": "application/json" }
    })
    .then(res => res.json())
    .then(res => {

      document.querySelector(".container").innerHTML = `
        <h2>✅ Booking Confirmed</h2>
        <p>ETA: ${eta}</p>
        <p>OTP: ${res.otp}</p>
        <div id="qr"></div>
        <button onclick="location.reload()">Book Again</button>
      `;

      const script = document.createElement("script");
      script.src = "https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js";
      script.onload = () => {
        new QRCode(document.getElementById("qr"), {
          text: res.qr,
          width: 200,
          height: 200
        });
      };
      document.body.appendChild(script);

    });

  }, 2000);
}
</script>

</body>
</html>
